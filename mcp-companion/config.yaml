name: MCP Companion
version: "0.1.3"
slug: mcp_companion
description: Authenticated companion service for a local Home Assistant MCP server.
url: https://github.com/pbadinger/homeassistant-mcp-addon/tree/main/mcp-companion
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
hassio_api: true
hassio_role: manager
homeassistant_api: true
map:
  - config:rw
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: MCP Companion API
options:
  companion_token: ""
  log_level: info
  allowed_config_roots:
    - "/config"
schema:
  companion_token: password
  log_level: list(trace|debug|info|warning|error)
  allowed_config_roots:
    - str
